<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Green Taxi Domažlice - Uzávěrky v5.5</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary-color: #2e7d32; 
            --primary-light: #e8f5e9;
            --secondary-color: #4f5b66;
            --danger-color: #c62828;
            --bg-color: #f1f5f9; 
            --card-bg: #ffffff;
            --text-dark: #1e293b;
            --text-muted: #64748b;
            --border-light: #e2e8f0;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; padding: 10px; background-color: var(--bg-color); color: var(--text-dark);
        }

        .container { 
            max-width: 1200px; margin: auto; background: var(--card-bg); padding: 20px 15px; 
            border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); 
        }
        
        h2 { 
            text-align: center; color: var(--primary-color); cursor: pointer; font-size: 24px; 
            font-weight: 800; text-transform: uppercase; margin-bottom: 20px;
        }

        h3 { border-bottom: 3px solid var(--primary-light); padding-bottom: 8px; margin-top: 0; font-size: 19px; }
        .box { display: none; }
        .active { display: block; }
        
        input, select { 
            display: block; margin: 10px 0 18px 0; padding: 14px; width: 100%; 
            border: 2px solid var(--border-light); border-radius: 10px; font-size: 16px; background-color: #f8fafc;
        }
        
        button { 
            background: var(--primary-color); color: white; border: none; padding: 16px; 
            border-radius: 10px; width: 100%; font-weight: bold; font-size: 16px; cursor: pointer;
        }
        .secondary-btn { background: var(--secondary-color); margin-top: 8px; }
        .nav-buttons { display: flex; flex-direction: column; gap: 4px; margin-top: 20px; }

        /* Styl pro chybovou hlášku */
        .error-banner {
            background-color: #fee2e2; color: #b91c1c; padding: 12px; 
            border-radius: 8px; border: 1px solid #fca5a5; margin-bottom: 15px; 
            font-weight: bold; text-align: center; font-size: 14px; display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h2 onclick="vstoupitDoArchivuPresHeslo()">Green Taxi Domažlice</h2>

    <div id="errorBanner" class="error-banner"></div>

    <div id="sec-login" class="box">
        <h3>Přihlášení řidiče</h3>
        <input type="text" id="logUser" placeholder="Uživatelské jméno">
        <input type="password" id="logPass" placeholder="Heslo">
        <div class="nav-buttons">
            <button onclick="prihlasit()">VSTOUPIT DO SYSTÉMU</button>
            <button class="secondary-btn" onclick="vstoupitAdmin()">REGISTRACE (ADMIN)</button>
        </div>
    </div>

    <div id="sec-fleet" class="box">
        <div id="welcomeUser" style="text-align: right; font-size: 13px; color: var(--text-muted); font-weight: bold;"></div>
        <h3>Vyberte vozidlo</h3>
        <div id="fleetGrid"></div>
        <button class="secondary-btn" onclick="odhlasit()" style="margin-top: 25px;">ODHLÁSIT SE</button>
    </div>
</div>

<script>
    // Konfigurace
    const SUPABASE_URL = "https://nWrlsvBKp3SrrvG9v1Rrig.supabase.co"; 
    const SUPABASE_KEY = "sb_publishable_nWrlsvBKp3SrrvG9v1Rrig_mETsc-eC";
    let supabase = null;

    const ADMIN_HESLO = "26 3654";
    let ridici = JSON.parse(localStorage.getItem('taxi_ridici')) || { "admin": "1234" };
    let auta = [ { id: 1, nazev: "Octavia G1", spz: "4P5 1234", km: 120000 } ];
    let prihlasenyUzivatel = localStorage.getItem('taxi_user') || "";

    // HLAVNÍ SPOUŠTĚČ STRÁNKY S POJISTKOU PROTI ZAMRZNUTÍ
    window.onload = () => {
        try {
            // Kontrola, zda se knihovna Supabase správně stáhla z internetu
            if (window.supabase && typeof window.supabase.createClient === 'function') {
                supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                console.log("Supabase úspěšně inicializováno.");
            } else {
                zobrazChybu("⚠️ Pozor: Knihovnu Supabase se nepodařilo načíst. Stránka běží v nouzovém režimu bez odesílání do databáze.");
            }
        } catch (e) {
            zobrazChybu("⚠️ Chyba při startu databáze: " + e.message);
        }

        // Vždy zobrazíme okno, i když databáze selže, aby stránka nezůstala prázdná
        if (prihlasenyUzivatel) { 
            prepnout('sec-fleet'); 
            document.getElementById('welcomeUser').innerText = "👤 " + prihlasenyUzivatel;
            vykreslitAuta(); 
        } else { 
            prepnout('sec-login'); 
        }
    };

    function zobrazChybu(text) {
        const banner = document.getElementById('errorBanner');
        if (banner) {
            banner.innerText = text;
            banner.style.display = 'block';
        }
    }

    function prepnout(id) {
        document.querySelectorAll('.box').forEach(b => b.style.display = 'none');
        const target = document.getElementById(id);
        if (target) target.style.display = 'block';
    }

    function vykreslitAuta() {
        const grid = document.getElementById('fleetGrid');
        grid.innerHTML = "";
        auta.forEach(a => {
            grid.innerHTML += `<div style="padding:15px; border:1px solid #ccc; margin:5px; cursor:pointer;" onclick="alert('Auto vybráno')"><b>${a.nazev}</b> (${a.spz})</div>`;
        });
    }

    function prihlasit() {
        const u = document.getElementById('logUser').value.trim();
        const p = document.getElementById('logPass').value;
        if (ridici[u] && ridici[u] === p) {
            prihlasenyUzivatel = u; 
            localStorage.setItem('taxi_user', u);
            prepnout('sec-fleet');
            document.getElementById('welcomeUser').innerText = "👤 " + prihlasenyUzivatel;
            vykreslitAuta();
        } else {
            alert("Neplatné přihlašovací údaje! Použijte např. admin / 1234");
        }
    }

    function odhlasit() { localStorage.removeItem('taxi_user'); location.reload(); }
    function vstoupitAdmin() { alert("Pro registraci zadejte heslo..."); }
    function vstoupitDoArchivuPresHeslo() { alert("Vstup do archivu"); }
</script>
</body>
</html>
