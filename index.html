<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Green Taxi Domažlice</title>
    <style>
        body { 
            font-family: sans-serif; 
            margin: 0; 
            padding: 20px; 
            background-color: #f1f5f9; 
            color: #1e293b;
            text-align: center;
        }
        .container { 
            max-width: 400px; 
            margin: auto; 
            background: white; 
            padding: 30px 20px; 
            border-radius: 16px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
        }
        h2 { color: #2e7d32; text-transform: uppercase; margin-bottom: 25px; }
        h3 { margin-top: 0; color: #4f5b66; }
        input { 
            display: block; 
            margin: 10px 0 20px 0; 
            padding: 14px; 
            width: 100%; 
            box-sizing: border-box;
            border: 2px solid #e2e8f0; 
            border-radius: 10px; 
            font-size: 16px; 
        }
        button { 
            background: #2e7d32; 
            color: white; 
            border: none; 
            padding: 16px; 
            border-radius: 10px; 
            width: 100%; 
            font-weight: bold; 
            font-size: 16px; 
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Green Taxi Domažlice</h2>
    
    <div id="okno">
        <h3>Testovací přihlášení</h3>
        <p style="font-size: 14px; color: #64748b;">Pokud vidíte toto okno, kód konečně funguje!</p>
        <input type="text" placeholder="Uživatelské jméno (zadejte: admin)">
        <input type="password" placeholder="Heslo (zadejte: 1234)">
        <button onclick="stisknuto()">VSTOUPIT</button>
    </div>
</div>

<script>
    // Tento skript se spustí hned, jak se stránka načte
    console.log("Kód byl úspěšně spuštěn!");

    function stisknuto() {
        alert("Tlačítko funguje! Výborně, základní kód běží.");
    }
</script>
</body>
</html>
