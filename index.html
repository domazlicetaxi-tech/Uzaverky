<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { 
        getFirestore, doc, getDoc, setDoc, updateDoc, collection, addDoc, getDocs, deleteDoc, query, orderBy 
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCuY84v35xHCwVUwONnAsh3Hf-jozfLZwE",
        authDomain: "uzaverky-9be6a.firebaseapp.com",
        projectId: "uzaverky-9be6a",
        storageBucket: "uzaverky-9be6a.firebasestorage.app",
        messagingSenderId: "822628550738",
        appId: "1:822628550738:web:93a046849f310b3110378b"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const ADMIN_HESLO = "26 3654";
    const SAZBA = 9;

    let ridici = { "admin": "1234" };
    let databaze = [];
    
    const defaultAuta = [
        { id: 1, nazev: "Octavia G1", spz: "4P5 1234", km: 0 },
        { id: 2, nazev: "Superb G2", spz: "5P1 8899", km: 0 },
        { id: 3, nazev: "Passat G3", spz: "2AS 4567", km: 0 },
        { id: 4, nazev: "Hyundai G4", spz: "8P9 0011", km: 0 },
        { id: 5, nazev: "Octavia G5", spz: "3P2 5544", km: 0 },
        { id: 6, nazev: "Toyota G6", spz: "6P7 2233", km: 0 },
        { id: 7, nazev: "Superb G7", spz: "7P4 1122", km: 0 },
        { id: 8, nazev: "Octavia G8", spz: "1P8 9900", km: 0 },
        { id: 9, nazev: "Passat G9", spz: "9P3 4455", km: 0 },
        { id: 10, nazev: "Hyundai G10", spz: "5P6 7788", km: 0 }
    ];

    let auta = defaultAuta;
    let prihlasenyUzivatel = localStorage.getItem('taxi_user') || "";
    let vybraneAuto = null;

    async function nacistDataZFirebase() {
        try {
            const ridiciDoc = await getDoc(doc(db, "nastaveni", "ridici"));
            if (ridiciDoc.exists()) {
                ridici = ridiciDoc.data();
            } else {
                await setDoc(doc(db, "nastaveni", "ridici"), ridici);
            }

            const autaDoc = await getDoc(doc(db, "nastaveni", "auta"));
            if (autaDoc.exists()) {
                auta = autaDoc.data().seznam || defaultAuta;
            } else {
                await setDoc(doc(db, "nastaveni", "auta"), { seznam: defaultAuta });
            }

            const q = query(collection(db, "uzaverky"), orderBy("rawDatum", "desc"));
            const querySnapshot = await getDocs(q);
            databaze = [];
            querySnapshot.forEach((doc) => {
                databaze.push({ firebaseId: doc.id, ...doc.data() });
            });

            inicializovatAplikaci();
        } catch (error) {
            console.error("Chyba Firebase:", error);
            ridici = JSON.parse(localStorage.getItem('taxi_ridici')) || { "admin": "1234" };
            auta = JSON.parse(localStorage.getItem('taxi_auta_v3')) || defaultAuta;
            databaze = JSON.parse(localStorage.getItem('taxi_db')) || [];
            inicializovatAplikaci();
        }
    }

    function inicializovatAplikaci() {
        if (prihlasenyUzivatel) { 
            prepnout('sec-fleet'); 
            document.getElementById('welcomeUser').innerText = "👤 " + prihlasenyUzivatel;
            vykreslitAuta(); 
        } else { 
            prepnout('sec-login'); 
        }
        nactiFiltryVArchivu();
    }

    window.onload = () => {
        nacistDataZFirebase();
    };

    window.prepnout = function(id) {
        document.querySelectorAll('.box').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'sec-edit-cars') vykreslitEditaciAut();
        if(id === 'sec-edit-drivers') nactiAdokresliRidice();
        if(id === 'sec-database') { nactiFiltryVArchivu(); vykreslitDatabazi(); }
        
        if(vybraneAuto) {
            document.querySelectorAll('.car-label').forEach(el => {
                el.innerHTML = `🚗 ${vybraneAuto.nazev} <span class="spz-tag" style="font-size:14px; min-width:80px; padding:0 5px; margin:0 5px;">${vybraneAuto.spz}</span>`;
            });
        }
    }

    window.prihlasit = function() {
        const u = document.getElementById('logUser').value.trim();
        const p = document.getElementById('logPass').value;
        if (ridici[u] && ridici[u] === p) {
            prihlasenyUzivatel = u; 
            localStorage.setItem('taxi_user', u);
            inicializovatAplikaci();
        } else alert("Neplatné přihlašovací údaje!");
    }

    window.odhlasit = function() { 
        localStorage.removeItem('taxi_user'); 
        prihlasenyUzivatel = "";
        location.reload(); 
    }
    
    window.vstoupitAdmin = function() { 
        if (prompt("Zadejte heslo administrátora:") === ADMIN_HESLO) {
            prepnout('sec-reg'); 
        } else alert("Nesprávné administrátorské heslo!");
    }

    window.vytvoritRidice = async function() {
        const u = document.getElementById('regUser').value.trim();
        const p = document.getElementById('regPass').value;
        if(u && p) { 
            ridici[u] = p; 
            try {
                await setDoc(doc(db, "nastaveni", "ridici"), ridici);
                localStorage.setItem('taxi_ridici', JSON.stringify(ridici)); 
                alert(`Řidič "${u}" byl úspěšně vytvořen ve Firebase.`);
                prepnout('sec-login'); 
            } catch(e) { alert("Chyba ukládání na Firebase."); }
        } else alert("Musíte vyplnit jméno i heslo!");
    }

    function vykreslitAuta() {
        const grid = document.getElementById('fleetGrid');
        grid.innerHTML = "";
        auta.sort((a, b) => a.id - b.id).forEach(a => {
            grid.innerHTML += `
                <div class="car-card" onclick="window.vybratAuto(${a.id})">
                    <strong style="font-size: 15px;">${a.nazev}</strong>
                    <div class="spz-tag">${a.spz}</div>
                    <div style="color:var(--primary-color); font-weight:bold; font-size:14px;">${a.km} km</div>
                </div>`;
        });
    }

    window.vybratAuto = function(id) {
        vybraneAuto = auta.find(a => a.id === id);
        prepnout('sec-km');
        document.getElementById('startKm').value = vybraneAuto.km;
        document.getElementById('endKm').value = "";
        document.getElementById('fuelCena').value = "0";
        document.getElementById('fuelLitry').value = "0.00";
        document.getElementById('fuelKm').value = "0";
        document.getElementById('odpNazdrazaci').value = "0";
        document.getElementById('odpDalsi').value = "0";
        document.getElementById('odpocetKmVal').value = "0";
        document.getElementById('envelopeNum').value = "";
    }

    window.prejitNaTankovani = function() {
        const end = parseInt(document.getElementById('endKm').value);
        if(!end || end < vybraneAuto.km) { 
            alert(`Koncový stav musí být vyšší než počáteční (${vybraneAuto.km} km).`); 
            return; 
        }
        prepnout('sec-fuel');
    }

    window.validovatTankovani = function() {
        const valCena = document.getElementById('fuelCena').value.trim();
        const valLitry = document.getElementById('fuelLitry').value.trim();
        const valKm = document.getElementById('fuelKm').value.trim();
        const numCena = parseFloat(valCena) || 0;
        const numLitry = parseFloat(valLitry) || 0;
        const numKm = parseInt(valKm) || 0;

        if (numCena > 0 || numLitry > 0) {
            if (numKm <= 0) { alert("Musíte zadat stav tachometru při tankování!"); return; }
            if (numCena <= 0 || numLitry <= 0) { alert("Zadejte cenu i litry!"); return; }
        }
        prepnout('sec-deductions');
    }

    window.zobrazitFinalniVyuctovani = function() {
        const start = parseInt(document.getElementById('startKm').value) || 0;
        const end = parseInt(document.getElementById('endKm').value) || 0;
        const odecetKm = parseInt(document.getElementById('odpocetKmVal').value) || 0;
        const celkemKm = end - start;
        const uctovaneKm = Math.max(0, celkemKm - odecetKm);
        const trzba = uctovaneKm * SAZBA;

        const fuelCena = parseFloat(document.getElementById('fuelCena').value) || 0;
        const nazdrazaci = parseFloat(document.getElementById('odpNazdrazaci').value) || 0;
        const dalsiVydaje = parseFloat(document.getElementById('odpDalsi').value) || 0;
        const celkemVydaje = fuelCena + nazdrazaci + dalsiVydaje;
        const kOdevzdani = trzba - celkemVydaje;

        document.getElementById('billFinalCash').innerText = kOdevzdani.toLocaleString('cs-CZ') + " Kč";

        let sp = "-";
        const fuelL = parseFloat(document.getElementById('fuelLitry').value) || 0;
        const fKm = parseInt(document.getElementById('fuelKm').value) || 0;
        if(fuelL > 0 && fKm > 0){
            const hist = databaze.filter(z => z.auto === vybraneAuto.nazev && z.tankKm > 0);
            if(hist.length > 0) {
                const uKm = fKm - hist[0].tankKm;
                if(uKm > 0) sp = ((fuelL / uKm) * 100).toFixed(2) + " l/100km";
            } else sp = "První měření";
        }

        document.getElementById('resTable').innerHTML = `
            <tr class="section-title"><th colspan="2">Přehled jízdy</th></tr>
            <tr><td>Vozidlo / Řidič:</td><td>${vybraneAuto.nazev} / ${prihlasenyUzivatel}</td></tr>
            <tr><td>Ujeto km celkem:</td><td>${celkemKm} km (${start} -> ${end})</td></tr>
            <tr><td>Korekce kilometrů:</td><td class="minus">-${odecetKm} km</td></tr>
            <tr><td>Učtované kilometry:</td><td>${uctovaneKm} km</td></tr>
            <tr style="font-weight:bold; background:#f8fafc;"><td>Hrubá tržba (${SAZBA} Kč/km):</td><td class="plus">${trzba} Kč</td></tr>
            <tr class="section-title"><th colspan="2">Výdaje z hotovosti</th></tr>
            <tr><td>Tankování:</td><td class="minus">-${fuelCena} Kč (${fuelL} l, spotřeba: ${sp})</td></tr>
            <tr><td>Nádražáci:</td><td class="minus">-${nazdrazaci} Kč</td></tr>
            <tr><td>Ostatní výdaje:</td><td class="minus">-${dalsiVydaje} Kč</td></tr>
            <tr style="font-weight:bold; background:#f1f5f9;"><td>Výdaje celkem:</td><td class="minus">-${celkemVydaje} Kč</td></tr>
        `;
        prepnout('sec-final');
    }

    window.validovatAotevritPodpis = function() {
        if(!document.getElementById('envelopeNum').value.trim()) { alert("Zadejte číslo obálky!"); return; }
        document.getElementById('signPass').value = "";
        document.getElementById('signOverlay').style.display = 'block';
    }

    // --- ZDE ZAČÍNÁ KOMPLETNÍ A OPRAVENÝ ZBYTEK KÓDU ---
    window.finalniPodpisOdeslani = async function() {
        const p = document.getElementById('signPass').value;
        if(ridici[prihlasenyUzivatel] !== p) { alert("Nesprávné heslo řidiče!"); return; }

        const start = parseInt(document.getElementById('startKm').value) || 0;
        const end = parseInt(document.getElementById('endKm').value) || 0;
        const odecetKm = parseInt(document.getElementById('odpocetKmVal').value) || 0;
        const celkemKm = end - start;
        const uctovaneKm = Math.max(0, celkemKm - odecetKm);
        const trzba = uctovaneKm * SAZBA;

        const fuelCena = parseFloat(document.getElementById('fuelCena').value) || 0;
        const fuelL = parseFloat(document.getElementById('fuelLitry').value) || 0;
        const fuelKm = parseInt(document.getElementById('fuelKm').value) || 0;
        const nazdrazaci = parseFloat(document.getElementById('odpNazdrazaci').value) || 0;
        const dalsiVydaje = parseFloat(document.getElementById('odpDalsi').value) || 0;
        const celkemVydaje = fuelCena + nazdrazaci + dalsiVydaje;
        const kOdevzdani = trzba - celkemVydaje;
        const obalka = document.getElementById('envelopeNum').value.trim();

        const ted = new Date();
        const uzaverkaData = {
            datum: ted.toLocaleString('cs-CZ'),
            rawDatum: ted.toISOString(),
            ridic: prihlasenyUzivatel,
            auto: vybraneAuto.nazev,
            obalka: obalka,
            kmStart: start,
            kmCil: end,
            odecetKm: odecetKm,
            trzba: trzba,
            litru: fuelL,
            cenaTank: fuelCena,
            tankKm: fuelKm,
            vydaje: nazdrazaci + dalsiVydaje,
            kOdevzdani: kOdevzdani
        };

        try {
            // 1. Uložit uzávěrku do kolekce
            await addDoc(collection(db, "uzaverky"), uzaverkaData);

            // 2. Aktualizovat stav tachometru daného vozidla
            vybraneAuto.km = end;
            await setDoc(doc(db, "nastaveni", "auta"), { seznam: auta });

            alert("Uzávěrka byla úspěšně uložena a synchronizována!");
            document.getElementById('signOverlay').style.display = 'none';
            
            // 3. Obnovit celá data z Firebase a přejít na hlavní přehled
            await nacistDataZFirebase();
        } catch(e) {
            console.error(e);
            alert("Chyba při online ukládání! Data byla uložena pouze lokálně.");
            // Fallback do localStorage
            databaze.unshift(uzaverkaData);
            localStorage.setItem('taxi_db', JSON.stringify(databaze));
            vybraneAuto.km = end;
            localStorage.setItem('taxi_auta_v3', JSON.stringify(auta));
            document.getElementById('signOverlay').style.display = 'none';
            inicializovatAplikaci();
        }
    }

    // --- POMOCNÉ ADMIN FUNKCE PRO SPRÁVU A FILTRACI ---
    function nactiFiltryVArchivu() {
        const carSel = document.getElementById('carFilter');
        const drSel = document.getElementById('driverFilter');
        if(!carSel || !drSel) return;

        carSel.innerHTML = '<option value="">-- Všechna auta --</option>';
        drSel.innerHTML = '<option value="">-- Všichni řidiči --</option>';

        auta.forEach(a => carSel.innerHTML += `<option value="${a.nazev}">${a.nazev}</option>`);
        Object.keys(ridici).forEach(r => drSel.innerHTML += `<option value="${r}">${r}</option>`);
    }

    window.vykreslitDatabazi = function() {
        const tbody = document.getElementById('dbBody');
        if(!tbody) return;
        tbody.innerHTML = "";

        const fCar = document.getElementById('carFilter').value;
        const fDriver = document.getElementById('driverFilter').value;
        const fFrom = document.getElementById('dateFromFilter').value;
        const fTo = document.getElementById('dateToFilter').value;

        let filtrovano = databaze.filter(z => {
            if(fCar && z.auto !== fCar) return false;
            if(fDriver && z.ridic !== fDriver) return false;
            if(fFrom && new Date(z.rawDatum) < new Date(fFrom)) return false;
            if(fTo) {
                let toDate = new Date(fTo);
                toDate.setDate(toDate.getDate() + 1); // do konce vybraného dne
                if(new Date(z.rawDatum) >= toDate) return false;
            }
            return true;
        });

        if(filtrovano.length === 0) {
            tbody.innerHTML = `<tr><td colspan="16" style="text-align:center; color:var(--text-muted);">Žádné záznamy neodpovídají filtrům.</td></tr>`;
            return;
        }

        filtrovano.forEach(z => {
            let spotreba = "-";
            tbody.innerHTML += `
                <tr>
                    <td class="nowrap">${z.datum}</td>
                    <td><b>${z.ridic}</b></td>
                    <td class="nowrap">${z.auto}</td>
                    <td><b>${z.obalka || '-'}</b></td>
                    <td>${z.kmStart}</td>
                    <td>${z.kmCil}</td>
                    <td class="minus">${z.odecetKm > 0 ? '-' + z.odecetKm : 0}</td>
                    <td class="plus">${z.trzba} Kč</td>
                    <td>${z.litru || 0} l</td>
                    <td class="minus">${z.cenaTank > 0 ? '-' + z.cenaTank + ' Kč' : '0 Kč'}</td>
                    <td>${z.tankKm || 0}</td>
                    <td>-</td>
                    <td class="minus">-${z.vydaje || 0} Kč</td>
                    <td style="font-weight:bold; background:#e8f5e9;">${z.kOdevzdani} Kč</td>
                    <td><button class="btn-delete" onclick="smazatZaznam('${z.firebaseId || ''}', ${z.kmStart}, '${z.auto}')">❌</button></td>
                </tr>`;
        });
    }

    window.smazatZaznam = async function(id, puvodniKm, autoNazev) {
        if(!confirm("Opravdu chcete smazat tuto uzávěrku? (Stav tachometru auta se automaticky nevrátí!)")) return;
        if(prompt("Pro smazání zadejte administrátorské heslo:") !== ADMIN_HESLO) { alert("Nesprávné heslo!"); return; }

        if(id) {
            try {
                await deleteDoc(doc(db, "uzaverky", id));
                alert("Smazáno z Firebase.");
            } catch(e) { alert("Chyba při mazání na serveru."); }
        } else {
            databaze = databaze.filter(z => z.rawDatum !== id);
            localStorage.setItem('taxi_db', JSON.stringify(databaze));
            alert("Smazáno lokálně.");
        }
        await nacistDataZFirebase();
    }

    function vykreslitEditaciAut() {
        const tbody = document.getElementById('editCarsBody');
        tbody.innerHTML = "";
        auta.sort((a,b)=>a.id-b.id).forEach((a, index) => {
            tbody.innerHTML += `
                <tr>
                    <td><input type="text" class="edit-car-input" value="${a.nazev}" id="editCarNazev_${index}"></td>
                    <td><input type="text" class="edit-car-input" value="${a.spz}" id="editCarSpz_${index}" style="font-weight:bold; text-transform:uppercase;"></td>
                    <td><input type="number" class="edit-car-input" value="${a.km}" id="editCarKm_${index}"></td>
                </tr>`;
        });
    }

    window.ulozitZmenyAut = async function() {
        auta.forEach((a, index) => {
            a.nazev = document.getElementById(`editCarNazev_${index}`).value.trim();
            a.spz = document.getElementById(`editCarSpz_${index}`).value.trim().toUpperCase();
            a.km = parseInt(document.getElementById(`editCarKm_${index}`).value) || 0;
        });

        try {
            await setDoc(doc(db, "nastaveni", "auta"), { seznam: auta });
            localStorage.setItem('taxi_auta_v3', JSON.stringify(auta));
            alert("Změny autoparku byly uloženy online!");
            prepnout('sec-database');
        } catch(e) { alert("Chyba při ukládání aut na Firebase."); }
    }

    function nactiAdokresliRidice() {
        const tbody = document.getElementById('editDriversBody');
        tbody.innerHTML = "";
        Object.keys(ridici).forEach(r => {
            if(r === 'admin') return;
            tbody.innerHTML += `
                <tr>
                    <td><b>${r}</b></td>
                    <td><input type="text" class="edit-car-input" value="${ridici[r]}" id="editDrPass_${r}"></td>
                    <td><button class="btn-delete" onclick="smazatRidiceAdmin('${r}')">SMAZAT</button></td>
                </tr>`;
        });
    }

    window.adminPridatRidice = function() {
        const u = document.getElementById('adminNewUser').value.trim();
        const p = document.getElementById('adminNewPass').value.trim();
        if(u && p) {
            ridici[u] = p;
            document.getElementById('adminNewUser').value = "";
            document.getElementById('adminNewPass').value = "";
            nactiAdokresliRidice();
        } else alert("Vyplňte jméno i heslo nového řidiče.");
    }

    window.smazatRidiceAdmin = function(r) {
        if(confirm(`Opravdu smazat řidiče ${r}?`)) {
            delete ridici[r];
            nactiAdokresliRidice();
        }
    }

    window.ulozitZmenyRidicu = async function() {
        Object.keys(ridici).forEach(r => {
            if(r === 'admin') return;
            const el = document.getElementById(`editDrPass_${r}`);
            if(el) ridici[r] = el.value.trim();
        });

        try {
            await setDoc(doc(db, "nastaveni", "ridici"), ridici);
            localStorage.setItem('taxi_ridici', JSON.stringify(ridici));
            alert("Změny řidičů uloženy na Firebase.");
            prepnout('sec-database');
        } catch(e) { alert("Chyba uložení řidičů."); }
    }

    window.exportToCSV = function() {
        if(databaze.length === 0) { alert("Žádná data k exportu."); return; }
        let csv = "\uFEFFDatum a cas;Ridic;Vozidlo;Obalka;Km Start;Km Cil;Odecet Km;Trzba;Litru;Cena Tankovani;Km Pumpa;Vydaje;K odevzdani\n";
        
        databaze.forEach(z => {
            csv += `${z.datum};${z.ridic};${z.auto};${z.obalka || ''};${z.kmStart};${z.kmCil};${z.odecetKm};${z.trzba};${z.litru};${z.cenaTank};${z.tankKm};${z.vydaje};${z.kOdevzdani}\n`;
        });

        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.setAttribute("download", `uzaverky_green_taxi_${new Date().toLocaleDateString('cs-CZ')}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
</script>
